[book]
title = "ENIGMASH - Original Author Jack Lance"
authors = ["qiekn"]
language = "en"
src = "src"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/qiekn/enigmash"
edit-url-template = "https://github.com/qiekn/enigmash/edit/main/docs/src/{path}"
no-section-label = false

[output.html.fold]
enable = true
level = 0

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
